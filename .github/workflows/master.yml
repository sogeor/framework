name: CI/CD
on:
  pull_request:
    branches:
      - master
    paths-ignore:
      - .idea/
      - .editorconfig
      - .gitattributes
      - .gitignore
      - LICENSE*
      - README*
  push:
    branches:
      - master
    paths-ignore:
      - .idea/
      - .editorconfig
      - .gitattributes
      - .gitignore
      - LICENSE*
      - README*
jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Инициализация рабочего процесса
        uses: actions/checkout@v6
      - name: Подготовка JDK
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: temurin
          cache: gradle
      - name: Подготовка Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: "9.4.0"
      - name: Сборка и тестирование проекта
        run: ./gradlew check
  cd:
    name: CD
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Инициализация рабочего процесса
        uses: actions/checkout@v6
      - name: Подготовка JDK
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: temurin
          cache: gradle
      - name: Подготовка Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: "9.4.0"
      - name: Сборка проекта
        run: ./gradlew build
      - name: Публикация проекта
        uses: jreleaser/release-action@v2
        env:
          JRELEASER_BRANCH: ${{ vars.JRELEASER_BRANCH }}
          JRELEASER_DEFAULT_GIT_REMOTE: ${{ vars.JRELEASER_DEFAULT_GIT_REMOTE }}
          JRELEASER_GITHUB_USERNAME: ${{ vars.JRELEASER_GITHUB_USERNAME }}
          JRELEASER_MAVENCENTRAL_URL: ${{ vars.JRELEASER_MAVENCENTRAL_URL }}
          JRELEASER_PRERELEASE_PATTERN: ${{ vars.JRELEASER_PRERELEASE_PATTERN }}
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.JRELEASER_GPG_PASSPHRASE }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.JRELEASER_GPG_PUBLIC_KEY }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.JRELEASER_GPG_SECRET_KEY }}
          JRELEASER_MAVENCENTRAL_TOKEN: ${{ secrets.JRELEASER_MAVENCENTRAL_TOKEN }}
          JRELEASER_MAVENCENTRAL_USERNAME: ${{ secrets.JRELEASER_MAVENCENTRAL_USERNAME }}
      - name: Сохранение отладочной информации о публикации проекта
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jreleaser-release
          path: |
            out/jreleaser/trace.log
            out/jreleaser/output.properties
